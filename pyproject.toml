[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "smfeval"
version = "0.0.0"
description = "Probabilistic SLAM evaluation"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "Apache 2.0" }  # or whatever you'll actually use
authors = [{ name = "Ola Rønning", email = "oroe@itu.dk" }]
classifiers = [
    "Development Status :: 1 - Planning",
    "Programming Language :: Python :: 3",
]

[project.urls]
Homepage = "https://github.com/svendbot/smfeval"
