name: Publish to PyPI

on:
  push:
    tags:
      - "v*"           # triggers on tags like v0.1.0, v1.2.3

jobs:
  version-check:
    name: Version consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Tag matches pyproject and SQUARE spec
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pyproject=$(sed -n 's/^version = "\(.*\)"/\1/p' pyproject.toml | head -1)
          spec=$(sed -n 's/^\*\*Version:\*\* \(.*\)/\1/p' SQUARE_spec.md | head -1)
          echo "tag=$tag  pyproject=$pyproject  spec=$spec"
          [ "$tag" = "$pyproject" ] || { echo "::error::tag $tag != pyproject $pyproject"; exit 1; }
          [ "$tag" = "$spec" ] || { echo "::error::tag $tag != SQUARE_spec.md $spec"; exit 1; }

  build:
    name: Build distribution
    needs: version-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build
        run: python -m pip install --upgrade build
      - name: Build sdist and wheel
        run: python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
