name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: pytest (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Sync dependencies
        run: uv sync --dev
      - name: Run tests
        run: uv run pytest -q
        env:
          HYPOTHESIS_PROFILE: ci

  lint:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Sync dependencies
        run: uv sync --dev
      - name: Lint
        run: uvx ruff@0.15.11 check smfeval tests scripts
      - name: Format check
        run: uvx ruff@0.15.11 format --check smfeval tests scripts
      - name: Exporter layout
        run: uv run python scripts/check_exporters.py
      - name: SQUARE spec version matches FORMAT_VERSION
        run: |
          fmt=$(uv run python -c "from smfeval.format import FORMAT_VERSION; print(FORMAT_VERSION)")
          spec=$(sed -n 's/^\*\*Version:\*\* \(.*\)/\1/p' SQUARE_spec.md | head -1)
          echo "code=$fmt  spec=$spec"
          [ "$fmt" = "$spec" ] || { echo "::error::SQUARE_spec.md Version ($spec) != FORMAT_VERSION ($fmt)"; exit 1; }

  docs:
    name: sphinx
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Sync dependencies
        run: uv sync --group docs
      - name: Build docs (warnings are errors)
        run: uv run --group docs sphinx-build -W -b html docs docs/_build/html
